<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Finanças Pessoais</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>💰 Meu Fluxo de Caixa</h1>
    </header>

    <main class="container">
        
        <!-- SEÇÃO 1: CARDS DE SALDO -->
        <section class="saldos-container">
            <div class="card entrada">
                <h3>Entradas</h3>
                <p id="texto-entrada">R$ 0,00</p>
            </div>
            <div class="card saida">
                <h3>Saídas</h3>
                <p id="texto-saida">R$ 0,00</p>
            </div>
            <div class="card total">
                <h3>Saldo Atual</h3>
                <p id="texto-total">R$ 0,00</p>
            </div>
        </section>

        <!-- SEÇÃO 2: FORMULÁRIO DE NOVA TRANSAÇÃO -->
        <section class="form-container">
            <h2>Nova Transação</h2>
            <form id="form-transacao">
                <div class="input-group">
                    <label for="descricao">Descrição</label>
                    <input type="text" id="descricao" placeholder="Ex: Salário, Mercado..." required>
                </div>

                <div class="input-group">
                    <label for="valor">Valor (R$)</label>
                    <input type="number" id="valor" step="0.01" placeholder="0,00" required>
                </div>

                <div class="input-group">
                    <label for="tipo">Tipo</label>
                    <select id="tipo" required>
                        <option value="" disabled selected>Selecione...</option>
                        <option value="entrada">Entrada (+)</option>
                        <option value="saida">Saída (-)</option>
                    </select>
                </div>

                <button type="submit" id="btn-salvar">Adicionar</button>
            </form>
        </section>

        <!-- SEÇÃO 3: TABELA DE HISTÓRICO -->
        <section class="tabela-container">
            <h2>Histórico de Movimentações</h2>
            <table id="tabela-extrato">
                <thead>
                    <tr>
                        <th>Descrição</th>
                        <th>Valor</th>
                        <th>Tipo</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela">
                    <!-- As linhas de transações serão inseridas aqui dinamicamente via JS -->
                    <!-- Exemplo de como ficará uma linha estática para você testar o CSS: -->
                    <tr>
                        <td>Exemplo de Entrada</td>
                        <td class="valor-entrada">R$ 1.500,00</td>
                        <td>Entrada</td>
                        <td><button class="btn-deletar">❌</button></td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
